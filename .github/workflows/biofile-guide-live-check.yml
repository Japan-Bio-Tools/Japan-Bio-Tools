name: BioFile Guide Optional Live API Check (non-blocking)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * 1"

permissions:
  contents: read

concurrency:
  group: "biofile-guide-live-check"
  cancel-in-progress: false

jobs:
  live-check:
    name: Optional Live Provider Connectivity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scope note (non-blocking)
        run: |
          echo "This workflow is optional and separate from the mainline fixture-based quality gate." >> "$GITHUB_STEP_SUMMARY"
          echo "Failures indicate live endpoint health issues, not recorded-fixture regression failures." >> "$GITHUB_STEP_SUMMARY"

      - name: Run live provider check (RCSB / PDBe / PDBj)
        run: |
          set -o pipefail
          npm -w apps/biofile-guide run live-check | tee live-check-output.txt

      - name: Append provider table to summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Live Provider Results" >> "$GITHUB_STEP_SUMMARY"
          if grep -qE '^\| ' live-check-output.txt; then
            grep -E '^\| ' live-check-output.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_Provider table was not generated. Check job logs._" >> "$GITHUB_STEP_SUMMARY"
          fi
